          { q:'What should I bring on the day?', a:'Swimwear, sunscreen (reef-safe preferred), a hat, sunglasses, and a light cover-up. Towels, snorkel masks, fins, life vests, and all refreshments are provided. Cash for park fees in EUR, USD, or EGP is helpful but optional.' },
        ];
        return (
          <section id="faq" className="py-20 px-6 bg-onyx">
            <div className="max-w-4xl mx-auto">
              <div className="mb-14">
                <div className="flex items-baseline gap-5 mb-5"><span className="font-display" style={{ fontSize:'0.875rem', color:GOLD, fontWeight:400, letterSpacing:'0.05em' }}>&mdash; 08</span><p className="uppercase text-white/45" style={{ fontSize:'0.65rem', letterSpacing:'0.32em', fontWeight:400 }}>Frequently Asked</p></div>
                <AnimatedHeadline className="font-display text-white" style={{ fontSize:'clamp(2.4rem,6vw,4rem)', fontWeight:400, lineHeight:1.02, letterSpacing:'-0.02em' }} segments={[{ text:'Questions' },{ text:'Answered.', italic:true, color:GOLD }]} />
              </div>
              <div className="divide-y" style={{ borderTop:'1px solid rgba(255,255,255,0.08)', borderBottom:'1px solid rgba(255,255,255,0.08)' }}>
                {faqs.map(function(item,i){
                  var isOpen=open===i;
                  return (
                    <div key={item.q} style={{ borderColor:'rgba(255,255,255,0.08)' }}>
                      <button type="button" onClick={function(){setOpen(isOpen?null:i);}} className="w-full flex items-center justify-between gap-6 py-6 text-left group transition-colors" aria-expanded={isOpen}>
                        <span className="font-display text-white group-hover:text-[#D4AF37] transition-colors duration-300" style={{ fontSize:'clamp(1.05rem,2vw,1.25rem)', fontWeight:400 }}>{item.q}</span>
                        <span className="flex-shrink-0 transition-transform duration-500 ease-out" style={{ transform:isOpen?'rotate(45deg)':'rotate(0deg)' }}>{Plus && <Plus size={20} strokeWidth={1.25} color={isOpen?GOLD:'rgba(255,255,255,0.55)'} />}</span>
                      </button>
                      {isOpen && <p className="text-white/65 pb-6 pr-12 max-w-3xl" style={{ fontSize:'0.9375rem', lineHeight:1.75, fontWeight:300 }}>{item.a}</p>}
                    </div>
                  );
                })}
              </div>
            </div>
          </section>
        );
      }

      function Footer() {
        var quickLinks = [['Our Fleet','#boats'],['Experiences','#services'],['Gallery','#gallery'],['Reviews','#reviews']];
        var socials = [{ Icon:Instagram, label:'Instagram', href:'https://instagram.com' },{ Icon:Facebook, label:'Facebook', href:'https://facebook.com' }];
        var contactItems = [
          { Icon:MapPin, content:'Hurghada, Red Sea Governorate, Egypt', href:null },
          { Icon:Phone, content:'+20 11 12324252', href:'tel:+201112324252' },
          { Icon:Mail, content:'hello@sea-kingdom.com', href:'mailto:hello@sea-kingdom.com' },
        ];
        return (
          <footer className="bg-onyx text-white pt-20 pb-10 px-6" style={{ borderTop:'1px solid rgba(255,255,255,0.06)' }}>
            <div className="max-w-7xl mx-auto">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-14 mb-16">
                <div>
                  <div className="flex items-center gap-3 mb-6"><div className="w-10 h-10 flex items-center justify-center" style={{ background:GOLD, borderRadius:'2px' }}>{Anchor && <Anchor size={18} className="text-onyx" strokeWidth={1.75} />}</div><div><p className="font-display text-2xl text-white leading-none" style={{ fontWeight:500, letterSpacing:'0.04em' }}>sea-kingdom</p><p className="uppercase text-white/55 mt-1" style={{ fontSize:'0.55rem', letterSpacing:'0.4em', fontWeight:300 }}>Private Charters</p></div></div>
                  <p className="text-white/55 max-w-xs" style={{ fontSize:'0.875rem', lineHeight:1.7, fontWeight:300 }}>Hurghada&rsquo;s most exclusive private boat charter &mdash; crafted for those who demand nothing less than the extraordinary.</p>
                </div>
                <div>
                  <p className="uppercase text-white/45 mb-6" style={{ fontSize:'0.6rem', letterSpacing:'0.32em', fontWeight:400 }}>Quick Links</p>
                  <ul className="space-y-3">{quickLinks.map(function(ql){return <li key={ql[0]}><button type="button" onClick={function(){goTo(ql[1]);}} className="text-white/70 hover:text-[#D4AF37] transition-colors duration-300" style={{ fontSize:'0.875rem', fontWeight:300 }}>{ql[0]}</button></li>;})}</ul>
                </div>
                <div>
                  <p className="uppercase text-white/45 mb-6" style={{ fontSize:'0.6rem', letterSpacing:'0.32em', fontWeight:400 }}>Contact</p>
                  <ul className="space-y-4">
                    {contactItems.map(function(it){return(
                      <li key={it.content}>
                        {it.href ? <a href={it.href} className="flex items-start gap-3 text-white/70 hover:text-[#D4AF37] transition-colors" style={{ fontSize:'0.875rem', fontWeight:300 }}>{it.Icon && <it.Icon size={13} strokeWidth={1.5} color={GOLD} className="mt-1 flex-shrink-0" />}{it.content}</a> : <span className="flex items-start gap-3 text-white/70" style={{ fontSize:'0.875rem', fontWeight:300 }}>{it.Icon && <it.Icon size={13} strokeWidth={1.5} color={GOLD} className="mt-1 flex-shrink-0" />}{it.content}</span>}
                      </li>
                    );})}
                  </ul>
                  <div className="flex gap-2.5 mt-8">
                    {socials.map(function(s){return <a key={s.label} href={s.href} target="_blank" rel="noopener noreferrer" aria-label={s.label} className="w-10 h-10 flex items-center justify-center transition-all duration-300 hover:bg-[#D4AF37] hover:text-onyx" style={{ border:'1px solid rgba(255,255,255,0.15)', color:'rgba(255,255,255,0.65)', borderRadius:'2px' }}>{s.Icon && <s.Icon size={15} strokeWidth={1.5} />}</a>;})}
                  </div>
                </div>
              </div>
              <div className="pt-8 flex flex-col md:flex-row items-center justify-between gap-4" style={{ borderTop:'1px solid rgba(255,255,255,0.06)' }}>
                <p className="text-white/40" style={{ fontSize:'0.7rem', fontWeight:300 }}>&copy; {new Date().getFullYear()} sea-kingdom Private Charters. All rights reserved.</p>
                <div className="flex gap-7"><a href="#" className="text-white/40 hover:text-[#D4AF37] transition-colors uppercase" style={{ fontSize:'0.6rem', letterSpacing:'0.28em', fontWeight:300 }}>Privacy Policy</a><a href="#" className="text-white/40 hover:text-[#D4AF37] transition-colors uppercase" style={{ fontSize:'0.6rem', letterSpacing:'0.28em', fontWeight:300 }}>Terms &amp; Conditions</a></div>
              </div>
            </div>
          </footer>
        );
      }

      function WhatsAppButton() {
        var _so = useState(false), open=_so[0], setOpen=_so[1];
        var WA = 'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20enquire%20about%20a%20private%20charter.';
        var SUGGESTIONS = [
          { label:'Check availability today', href:'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20check%20availability%20today.' },
          { label:'Reserve the sons yacht', href:'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20reserve%20the%20sons%20yacht.' },
          { label:'Reserve Prince Momen', href:'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20reserve%20the%20Prince%20Momen.' },
          { label:'Plan a private celebration', href:'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20plan%20a%20private%20celebration.' },
        ];
        return (
          <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">
            {open && (
              <div className="w-[88vw] sm:w-[360px] overflow-hidden" style={{ background:'rgba(13,13,13,0.92)', backdropFilter:'blur(20px)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:'8px', boxShadow:'0 30px 80px -20px rgba(0,0,0,0.55)' }}>
                <div className="flex items-start justify-between px-6 pt-6 pb-5" style={{ borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
                  <div className="flex items-start gap-3">
                    <div className="w-9 h-9 flex items-center justify-center flex-shrink-0" style={{ background:GOLD, borderRadius:'2px' }}>{MessageCircle && <MessageCircle size={15} strokeWidth={1.75} color="#0D0D0D" />}</div>
                    <div><p className="font-display text-white leading-tight" style={{ fontSize:'1.1rem', fontWeight:500 }}>sea-kingdom <span className="italic" style={{ color:GOLD }}>concierge</span></p><p className="uppercase text-white/45 mt-1.5" style={{ fontSize:'0.55rem', letterSpacing:'0.32em', fontWeight:400 }}>Typically replies in under 2 hours</p></div>
                  </div>
                  <button type="button" onClick={function(){setOpen(false);}} className="text-white/45 hover:text-white transition-colors" aria-label="Close">{X && <X size={16} strokeWidth={1.75} />}</button>
                </div>
                <div className="px-6 pt-5"><p className="text-white/75" style={{ fontSize:'0.875rem', lineHeight:1.65, fontWeight:300 }}><span className="font-display italic text-white">Hello.</span> Your private charter begins with one message. Choose a starting point &mdash; we&rsquo;ll personally craft the rest.</p></div>
                <div className="px-3 pt-4 pb-4">
                  {SUGGESTIONS.map(function(s){return(
                    <a key={s.label} href={s.href} target="_blank" rel="noopener noreferrer" onClick={function(){setOpen(false);}} className="group flex items-center justify-between gap-3 px-3 py-3 text-white/75 hover:text-white hover:bg-white/[0.04] transition-colors" style={{ borderRadius:'2px' }}>
                      <span style={{ fontSize:'0.875rem', fontWeight:300 }}>{s.label}</span>
                      <span className="opacity-0 -translate-x-1 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-500" style={{ color:GOLD }}>&rarr;</span>
                    </a>
                  );})}
                </div>
                <a href={WA} target="_blank" rel="noopener noreferrer" onClick={function(){setOpen(false);}} className="block bg-white text-onyx hover:bg-[#D4AF37] hover:text-white text-center uppercase py-4 transition-all duration-500" style={{ fontSize:'0.7rem', letterSpacing:'0.32em', fontWeight:500 }}>Open WhatsApp</a>
              </div>
            )}
            <button type="button" onClick={function(){setOpen(function(v){return !v;});}} aria-label={open?'Close concierge':'Open concierge'} className="relative flex items-center justify-center w-14 h-14 transition-transform duration-500 hover:scale-110" style={{ background:'#0D0D0D', border:'1px solid '+GOLD, color:GOLD, borderRadius:'999px', boxShadow:'0 18px 40px -8px rgba(0,0,0,0.55)' }}>
              <span className="relative z-10">{open ? (X && <X size={20} strokeWidth={1.75} />) : (MessageCircle && <MessageCircle size={20} strokeWidth={1.75} />)}</span>
              {!open && <React.Fragment><span className="absolute inset-0 rounded-full animate-ping opacity-25" style={{ background:'rgba(212,175,55,0.55)' }} /><span className="absolute inset-0 rounded-full animate-ping opacity-15" style={{ background:'rgba(212,175,55,0.55)', animationDelay:'800ms' }} /></React.Fragment>}
            </button>
          </div>
        );
      }

      function App() {
        return (
          <React.Fragment>
            <ScrollProgress />
            <Navigation />
            <main>
              <Hero />
              <TrustBand />
              <Services />
              <Boats />
              <Gallery />
              <MenuSection />
              <HowItWorks />
              <DepartureMarina />
              <Reviews />
              <FAQ />
            </main>
            <Footer />
            <WhatsAppButton />
          </React.Fragment>
        );
      }

      createRoot(document.getElementById('root')).render(<StrictMode><App /></StrictMode>);
    </script>
  </body>
</html>
