 solid ${GOLD}`, borderRadius: '2px' }}><Icon size={14} strokeWidth={1.5} color={GOLD} /></div><div><p className="uppercase text-white/45 mb-1" style={{ fontSize: '0.6rem', letterSpacing: '0.28em', fontWeight: 400 }}>{label}</p><p className="text-white/85" style={{ fontSize: '0.9rem', fontWeight: 300, lineHeight: 1.55 }}>{value}</p></div></li>))}</ul><a href={MAP_LINK} target="_blank" rel="noopener noreferrer" className="group inline-flex items-center justify-center gap-2 mt-auto bg-white text-onyx hover:bg-[#D4AF37] hover:text-white uppercase py-3 transition-all duration-500" style={{ fontSize: '0.7rem', letterSpacing: '0.28em', fontWeight: 500, borderRadius: '2px' }}><MapPin size={13} strokeWidth={1.75} />Open in Maps</a></div></motion.div></div></section>);
      }

      function Reviews() {
        const FALLBACK_REVIEWS = [ { id: 1, name: 'Sarah Mitchell', location: 'London, UK', rating: 5, review: 'An absolutely breathtaking experience. The attention to detail and level of service exceeded all our expectations. The sunset cruise was the highlight of our trip to Egypt.' }, { id: 2, name: 'James & Emily Richardson', location: 'Sydney, Australia', rating: 5, review: 'We celebrated our anniversary on board and it was magical. The crew made us feel like royalty, the food was exquisite, and the Red Sea views were simply unforgettable.' }, { id: 3, name: 'Michael Chen', location: 'Singapore', rating: 5, review: 'The diving expedition was world-class. Our instructor was incredibly knowledgeable and patient. The coral reefs we explored were among the most beautiful I\'ve ever seen.' } ];
        const [reviews, setReviews] = useState(FALLBACK_REVIEWS);
        const [loading, setLoading] = useState(true);
        useEffect(() => { fetch('/api/reviews').then((r) => (r.ok ? r.json() : null)).then((data) => { if (Array.isArray(data) && data.length > 0) setReviews(data); }).catch(() => {}).finally(() => setLoading(false)); }, []);

        const ReviewCard = ({ review, index }) => (<motion.div initial={{ opacity: 0, y: 40 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true, margin: '-40px' }} transition={{ duration: 0.6, delay: index * 0.08 }} className="group p-8 flex flex-col" style={{ background: '#1a1a1a', border: '1px solid rgba(255,255,255,0.06)', borderRadius: '8px', transition: 'border-color 600ms ease, box-shadow 600ms ease, transform 600ms ease' }} whileHover={{ y: -4, borderColor: 'rgba(212,175,55,0.3)', boxShadow: '0 20px 50px -10px rgba(212,175,55,0.1)' }}><div className="w-10 h-10 flex items-center justify-center mb-5" style={{ border: '1px solid #D4AF37', borderRadius: '2px' }}><Quote size={15} strokeWidth={1.5} color="#D4AF37" /></div><div className="flex gap-1 mb-5">{Array.from({ length: review.rating }).map((_, i) => (<Star key={i} size={12} color="#D4AF37" fill="#D4AF37" />))}</div><p className="text-white/75 mb-7 flex-1 font-display italic" style={{ fontSize: '1rem', lineHeight: 1.65, fontWeight: 400 }}>&ldquo;{review.review}&rdquo;</p><div className="flex items-center gap-3 pt-5" style={{ borderTop: '1px solid rgba(255,255,255,0.08)' }}><div className="w-9 h-9 flex items-center justify-center text-white flex-shrink-0" style={{ border: '1px solid rgba(212,175,55,0.5)', borderRadius: '999px', fontSize: '0.7rem', letterSpacing: '0.1em', fontWeight: 500 }}>{review.name.split(' ').slice(0, 2).map((n) => n[0]).join('')}</div><div><p className="text-white" style={{ fontSize: '0.875rem', fontWeight: 500 }}>{review.name}</p><p className="text-white/45 uppercase" style={{ fontSize: '0.625rem', letterSpacing: '0.18em', fontWeight: 300 }}>{review.location}</p></div></div></motion.div>);
        return (<section id="reviews" className="py-20 px-6 bg-onyx relative overflow-hidden"><div className="max-w-7xl mx-auto relative"><motion.div initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ duration: 0.7 }} className="mb-14"><div className="flex items-baseline gap-5 mb-5"><span className="font-display" style={{ fontSize: '0.875rem', color: GOLD, fontWeight: 400, letterSpacing: '0.05em' }}>— 07</span><p className="uppercase text-white/45" style={{ fontSize: '0.65rem', letterSpacing: '0.32em', fontWeight: 400 }}>Guest Stories</p></div><AnimatedHeadline className="font-display text-white" style={{ fontSize: 'clamp(2.4rem, 6vw, 4rem)', fontWeight: 400, lineHeight: 1.02, letterSpacing: '-0.02em' }} segments={[{ text: 'Words from Those Who', lineBreakAfter: true }, { text: 'Sailed With Us.', italic: true, color: GOLD }]} /></motion.div><div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">{loading ? [...Array(6)].map((_, i) => <SkeletonCard key={i} />) : reviews.slice(0, 6).map((r, i) => <ReviewCard key={r.id} review={r} index={i} />)}</div></div></section>);
      }

      function FAQ() {
        const [open, setOpen] = useState(0);
        const faqs = [{ q: 'What happens if the weather is bad on my booked day?', a: 'In the event of unsafe sea conditions, your charter will be rescheduled to the nearest available date at no extra cost. If rescheduling is not possible, a full refund is issued. Safety is non-negotiable — our captains follow strict marina advisories.' }, { q: 'Are your diving instructors certified?', a: 'Yes. All our diving guides are PADI-certified professionals with a minimum of five years of Red Sea experience. We carry full safety documentation on board and provide briefings tailored to every skill level — from first-time discovery dives to advanced wreck and reef expeditions.' }, { q: 'Is the trip safe for children?', a: 'Absolutely. We provide child-sized life jackets, snorkel gear, and shallow-water snorkeling stops ideal for families. A dedicated crew member supervises children at all times near the deck. Please inform us of ages at booking so we can prepare accordingly.' }, { q: 'Are national park entry fees included?', a: 'Park fees for Giftun Islands, Orange Bay, and other protected areas are charged separately and paid in cash on the day of the trip (approximately 10 € per guest depending on destination). All other costs — fuel, lunch, equipment, transfers — are included in the charter price.' }, { q: 'Do you provide hotel transfers?', a: 'Yes — complimentary private transfers are included for all guests staying within Hurghada, El Gouna, Sahl Hasheesh, and Makadi Bay. Pickup is arranged 30 minutes before departure. Hotels outside these zones can be accommodated at a small additional cost.' }, { q: 'How do I confirm my booking?', a: 'After submitting an inquiry, our concierge will reply within 2 hours via WhatsApp or email to confirm availability and finalize details. No deposit or upfront payment is required — you settle on the day of the trip in any major currency, or by card in EGP at the official rate.' }, { q: 'Can I customise the itinerary?', a: 'Yes — every charter is private and built around you. Tell us your preferred snorkeling stops, lunch timing, sunset moments, or even a route designed around a marriage proposal or anniversary. Your captain will tailor the day live based on weather and your mood.' }, { q: 'What is your cancellation policy?', a: 'Because no deposit is taken, cancellations made more than 24 hours in advance carry no charge whatsoever. Inside 24 hours, we kindly ask for a courtesy fee to cover provisioning and crew preparation. Weather-related cancellations are always free.' }, { q: 'Can I bring my own drinks or alcohol on board?', a: 'Yes — guests are welcome to bring personal wine, champagne, or spirits. Our crew will chill and serve them for you. We can also pre-arrange a curated selection (champagne, Egyptian wines, premium spirits) added to the trip at cost — just ask when booking.' }, { q: 'Do you cater private events, proposals, or celebrations?', a: 'Absolutely. We regularly host marriage proposals, anniversaries, birthdays, and intimate corporate retreats. Floral arrangements, a personalised cake, a string quartet at sunset, even private photographers — our concierge will arrange every detail discreetly in advance.' }, { q: 'Is there Wi-Fi and mobile signal on board?', a: 'Egyptian 4G coverage reaches roughly 80% of our typical routes, including Orange Bay and Paradise Island. For full-day expeditions further out, signal can be intermittent — which most guests welcome as part of disconnecting. A mobile hotspot can be provided on request.' }, { q: 'What should I bring on the day?', a: 'Swimwear, sunscreen (reef-safe preferred), a hat, sunglasses, and a light cover-up for the journey home. Towels, snorkel masks, fins, life vests, and all refreshments are provided. Cash for park fees in either EUR, USD, or EGP is helpful but optional.' }];
        return (<section id="faq" className="py-20 px-6 bg-onyx"><div className="max-w-4xl mx-auto"><motion.div initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ duration: 0.7 }} className="mb-14"><div className="flex items-baseline gap-5 mb-5"><span className="font-display" style={{ fontSize: '0.875rem', color: GOLD, fontWeight: 400, letterSpacing: '0.05em' }}>— 08</span><p className="uppercase text-white/45" style={{ fontSize: '0.65rem', letterSpacing: '0.32em', fontWeight: 400 }}>Frequently Asked</p></div><AnimatedHeadline className="font-display text-white" style={{ fontSize: 'clamp(2.4rem, 6vw, 4rem)', fontWeight: 400, lineHeight: 1.02, letterSpacing: '-0.02em' }} segments={[{ text: 'Questions' }, { text: 'Answered.', italic: true, color: GOLD }]} /></motion.div><motion.div initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ duration: 0.7, delay: 0.1 }} className="divide-y" style={{ borderTop: '1px solid rgba(255,255,255,0.08)', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>{faqs.map((item, i) => { const isOpen = open === i; return (<div key={item.q} style={{ borderColor: 'rgba(255,255,255,0.08)' }}><button type="button" onClick={() => setOpen(isOpen ? null : i)} className="w-full flex items-center justify-between gap-6 py-6 text-left group transition-colors" aria-expanded={isOpen}><span className="font-display text-white group-hover:text-[#D4AF37] transition-colors duration-300" style={{ fontSize: 'clamp(1.05rem, 2vw, 1.25rem)', fontWeight: 400, letterSpacing: '-0.005em' }}>{item.q}</span><span className="flex-shrink-0 transition-transform duration-500 ease-out" style={{ transform: isOpen ? 'rotate(45deg)' : 'rotate(0deg)' }}><Plus size={20} strokeWidth={1.25} color={isOpen ? GOLD : 'rgba(255,255,255,0.55)'} /></span></button><AnimatePresence initial={false}>{isOpen && (<motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} transition={{ duration: 0.35, ease: 'easeOut' }} style={{ overflow: 'hidden' }}><p className="text-white/65 pb-6 pr-12 max-w-3xl" style={{ fontSize: '0.9375rem', lineHeight: 1.75, fontWeight: 300 }}>{item.a}</p></motion.div>)}</AnimatePresence></div>); })}</motion.div></div></section>);
      }

      function Footer() {
        const quickLinks = [['Our Fleet', '#boats'], ['Experiences', '#services'], ['Gallery', '#gallery'], ['Reviews', '#reviews']];
        const socials = [{ Icon: Instagram, label: 'Instagram', href: 'https://instagram.com' }, { Icon: Facebook, label: 'Facebook', href: 'https://facebook.com' }];
        const contactItems = [{ Icon: MapPin, content: 'Hurghada, Red Sea Governorate, Egypt', href: null }, { Icon: Phone, content: '+20 11 12324252', href: 'tel:+201112324252' }, { Icon: Mail, content: 'hello@sea-kingdom.com', href: 'mailto:hello@sea-kingdom.com' }];
        return (<footer className="bg-onyx text-white pt-20 pb-10 px-6" style={{ borderTop: '1px solid rgba(255,255,255,0.06)' }}><div className="max-w-7xl mx-auto"><div className="grid grid-cols-1 md:grid-cols-3 gap-14 mb-16"><motion.div initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ duration: 0.6 }}><div className="flex items-center gap-3 mb-6"><div className="w-10 h-10 flex items-center justify-center" style={{ background: GOLD, borderRadius: '2px' }}><Anchor size={18} className="text-onyx" strokeWidth={1.75} /></div><div><p className="font-display text-2xl text-white leading-none" style={{ fontWeight: 500, letterSpacing: '0.04em' }}>sea-kingdom</p><p className="uppercase text-white/55 mt-1" style={{ fontSize: '0.55rem', letterSpacing: '0.4em', fontWeight: 300 }}>Private Charters</p></div></div><p className="text-white/55 max-w-xs" style={{ fontSize: '0.875rem', lineHeight: 1.7, fontWeight: 300 }}>Hurghada’s most exclusive private boat charter — crafted for those who demand nothing less than the extraordinary.</p></motion.div><motion.div initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ duration: 0.6, delay: 0.1 }}><p className="uppercase text-white/45 mb-6" style={{ fontSize: '0.6rem', letterSpacing: '0.32em', fontWeight: 400 }}>Quick Links</p><ul className="space-y-3">{quickLinks.map(([label, href]) => (<li key={label}><button type="button" onClick={() => scrollTo(href)} className="text-white/70 hover:text-[#D4AF37] transition-colors duration-300" style={{ fontSize: '0.875rem', fontWeight: 300 }}>{label}</button></li>))}</ul></motion.div><motion.div initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ duration: 0.6, delay: 0.2 }}><p className="uppercase text-white/45 mb-6" style={{ fontSize: '0.6rem', letterSpacing: '0.32em', fontWeight: 400 }}>Contact</p><ul className="space-y-4">{contactItem       }

      function WhatsAppButton() {
        const [open, setOpen] = useState(false);
        const WA_LINK = 'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20enquire%20about%20a%20private%20charter.';
        const SUGGESTIONS = [
          { label: 'Check availability today', href: 'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20check%20availability%20today.' },
          { label: 'Reserve the sons yacht', href: 'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20reserve%20the%20sons%20yacht.' },
          { label: 'Reserve Prince Momen', href: 'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20reserve%20the%20Prince%20Momen.' },
          { label: 'Plan a private celebration', href: 'https://wa.me/201112324252?text=Hi%20sea-kingdom%2C%20I%27d%20like%20to%20plan%20a%20private%20celebration.' },
        ];
        return (<div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3"><AnimatePresence>{open && (<motion.div initial={{ opacity: 0, y: 16, scale: 0.96 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: 16, scale: 0.96 }} transition={{ duration: 0.35, ease: [0.22, 1, 0.36, 1] }} className="w-[88vw] sm:w-[360px] overflow-hidden" style={{ background: 'rgba(13,13,13,0.92)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: '8px', boxShadow: '0 30px 80px -20px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,175,55,0.08)' }}><div className="flex items-start justify-between px-6 pt-6 pb-5" style={{ borderBottom: '1px solid rgba(255,255,255,0.06)' }}><div className="flex items-start gap-3"><div className="w-9 h-9 flex items-center justify-center flex-shrink-0" style={{ background: GOLD, borderRadius: '2px' }}><MessageCircle size={15} strokeWidth={1.75} color="#0D0D0D" /></div><div><p className="font-display text-white leading-tight" style={{ fontSize: '1.1rem', fontWeight: 500, letterSpacing: '0.02em' }}>sea-kingdom <span className="italic" style={{ color: GOLD }}>concierge</span></p><p className="uppercase text-white/45 mt-1.5" style={{ fontSize: '0.55rem', letterSpacing: '0.32em', fontWeight: 400 }}>Typically replies in under 2 hours</p></div></div><button type="button" onClick={() => setOpen(false)} className="text-white/45 hover:text-white transition-colors" aria-label="Close"><X size={16} strokeWidth={1.75} /></button></div><div className="px-6 pt-5"><p className="text-white/75" style={{ fontSize: '0.875rem', lineHeight: 1.65, fontWeight: 300 }}><span className="font-display italic text-white">Hello.</span> Your private charter begins with one message. Choose a starting point — we&apos;ll personally craft the rest.</p></div><div className="px-3 pt-4 pb-4">{SUGGESTIONS.map((s) => (<a key={s.label} href={s.href} target="_blank" rel="noopener noreferrer" onClick={() => setOpen(false)} className="group flex items-center justify-between gap-3 px-3 py-3 text-white/75 hover:text-white hover:bg-white/[0.04] transition-colors" style={{ borderRadius: '2px' }}><span style={{ fontSize: '0.875rem', fontWeight: 300 }}>{s.label}</span><span className="opacity-0 -translate-x-1 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-500" style={{ color: GOLD, fontFamily: 'var(--font-display)' }}>→</span></a>))}</div><a href={WA_LINK} target="_blank" rel="noopener noreferrer" onClick={() => setOpen(false)} className="block bg-white text-onyx hover:bg-[#D4AF37] hover:text-white text-center uppercase py-4 transition-all duration-500" style={{ fontSize: '0.7rem', letterSpacing: '0.32em', fontWeight: 500 }}>Open WhatsApp</a></motion.div>)}</AnimatePresence><motion.button type="button" onClick={() => setOpen((v) => !v)} initial={{ opacity: 0, scale: 0.4, y: 20 }} animate={{ opacity: 1, scale: 1, y: 0 }} transition={{ delay: 1.8, duration: 0.7, ease: [0.22, 1, 0.36, 1] }} aria-label={open ? 'Close concierge' : 'Open concierge'} className="relative flex items-center justify-center w-14 h-14 transition-transform duration-500 hover:scale-110" style={{ background: '#0D0D0D', border: `1px solid ${GOLD}`, color: GOLD, borderRadius: '999px', boxShadow: '0 18px 40px -8px rgba(0,0,0,0.55), 0 0 0 1px rgba(212,175,55,0.15)' }}><span className="relative z-10">{open ? <X size={20} strokeWidth={1.75} /> : <MessageCircle size={20} strokeWidth={1.75} />}</span>{!open && <><span className="absolute inset-0 rounded-full animate-ping opacity-25" style={{ background: 'rgba(212,175,55,0.55)' }} /><span className="absolute inset-0 rounded-full animate-ping opacity-15" style={{ background: 'rgba(212,175,55,0.55)', animationDelay: '800ms' }} /></>}</motion.button></div>);
      }

      function App() {
        return (<BrowserRouter><Routes><Route path="/" element={<><ScrollProgress /><Navigation /><main><Hero /><TrustBand /><Services /><Boats /><Gallery /><Menu /><HowItWorks /><DepartureMarina /><Reviews /><FAQ /></main><Footer /><WhatsAppButton /></>} /></Routes></BrowserRouter>);

      const root = createRoot(document.getElementById('root'));
      root.render(<StrictMode><App /></StrictMode>);
