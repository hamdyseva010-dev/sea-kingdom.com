          { q:'Is the trip safe for children?', a:'Absolutely. We provide child-sized life jackets, snorkel gear, and shallow-water snorkeling stops ideal for families. A dedicated crew member supervises children at all times near the deck.' },
          { q:'Are national park entry fees included?', a:'Park fees for Giftun Islands, Orange Bay, and other protected areas are charged separately and paid in cash on the day of the trip (approximately 10 € per guest). All other costs — fuel, lunch, equipment, transfers — are included.' },
          { q:'Do you provide hotel transfers?', a:'Yes — complimentary private transfers are included for all guests staying within Hurghada, El Gouna, Sahl Hasheesh, and Makadi Bay. Pickup is arranged 30 minutes before departure.' },
          { q:'How do I confirm my booking?', a:'After submitting an inquiry, our concierge will reply within 2 hours via WhatsApp or email to confirm availability and finalize details. No deposit or upfront payment is required.' },
          { q:'Can I customise the itinerary?', a:'Yes — every charter is private and built around you. Tell us your preferred snorkeling stops, lunch timing, sunset moments, or even a route designed around a marriage proposal or anniversary.' },
          { q:'What is your cancellation policy?', a:'Because no deposit is taken, cancellations made more than 24 hours in advance carry no charge whatsoever. Inside 24 hours, we kindly ask for a courtesy fee to cover provisioning and crew preparation.' },
          { q:'Can I bring my own drinks or alcohol on board?', a:'Yes — guests are welcome to bring personal wine, champagne, or spirits. Our crew will chill and serve them for you. We can also pre-arrange a curated selection added to the trip at cost.' },
          { q:'Do you cater private events, proposals, or celebrations?', a:'Absolutely. We regularly host marriage proposals, anniversaries, birthdays, and intimate corporate retreats. Floral arrangements, a personalised cake, even private photographers — our concierge will arrange every detail.' },
          { q:'Is there Wi-Fi and mobile signal on board?', a:'Egyptian 4G coverage reaches roughly 80% of our typical routes, including Orange Bay and Paradise Island. For full-day expeditions further out, signal can be intermittent. A mobile hotspot can be provided on request.' },
          { q:'What should I bring on the day?', a:'Swimwear, sunscreen (reef-safe preferred), a hat, sunglasses, and a light cover-up. Towels, snorkel masks, fins, life vests, and all refreshments are provided. Cash for park fees in EUR, USD, or EGP is helpful but optional.' },
        ];
        return (

                  <button type="button" onClick={function(){setOpen(false);}} className="text-white/45 hover:text-white transition-colors" aria-label="Close">{X && <X size={16} strokeWidth={1.75} />}</button>
                </div>
                <div className="px-6 pt-5"><p className="text-white/75" style={{ fontSize:'0.875rem', lineHeight:1.65, fontWeight:300 }}><span className="font-display italic text-white">Hello.</span> Your private charter begins with one message. Choose a starting point &mdash; we&rsquo;ll personally craft the rest.</p></div>
                <div className="px-3 pt-4 pb-4">
                  {SUGGESTIONS.map(function(s){return(
                    <a key={s.label} href={s.href} target="_blank" rel="noopener noreferrer" onClick={function(){setOpen(false);}} className="group flex items-center justify-between gap-3 px-3 py-3 text-white/75 hover:text-white hover:bg-white/[0.04] transition-colors" style={{ borderRadius:'2px' }}>
                      <span style={{ fontSize:'0.875rem', fontWeight:300 }}>{s.label}</span>
                      <span className="opacity-0 -translate-x-1 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-500" style={{ color:GOLD }}>&rarr;</span>
                    </a>
                  );})}
                </div>
                <a href={WA} target="_blank" rel="noopener noreferrer" onClick={function(){setOpen(false);}} className="block bg-[#C9842A] text-white hover:bg-white hover:text-onyx text-center uppercase py-4 transition-all duration-500" style={{ fontSize:'0.7rem', letterSpacing:'0.32em', fontWeight:500 }}>Open WhatsApp</a>
              </div>
            )}
            <button type="button" onClick={function(){setOpen(function(v){return !v;});}} aria-label={open?'Close concierge':'Open concierge'} className="relative flex items-center justify-center w-14 h-14 transition-transform duration-500 hover:scale-110" style={{ background:'#050D1A', border:'1px solid '+GOLD, color:GOLD, borderRadius:'999px', boxShadow:'0 18px 40px -8px rgba(0,0,0,0.55)' }}>
              <span className="relative z-10">{open ? (X && <X size={20} strokeWidth={1.75} />) : (MessageCircle && <MessageCircle size={20} strokeWidth={1.75} />)}</span>
              {!open && <React.Fragment><span className="absolute inset-0 rounded-full animate-ping opacity-25" style={{ background:'rgba(201,132,42,0.55)' }} /><span className="absolute inset-0 rounded-full animate-ping opacity-15" style={{ background:'rgba(201,132,42,0.55)', animationDelay:'800ms' }} /></React.Fragment>}
            </button>
          </div>
        );
      }

      function App() {
        return (
          <React.Fragment>
            <ScrollProgress />
            <Navigation />
            <main>
              <Hero />
              <TrustBand />
              <Services />
              <Boats />
              <Gallery />
              <MenuSection />
              <HowItWorks />
              <DepartureMarina />
              <Reviews />
              <FAQ />
            </main>
            <Footer />
            <WhatsAppButton />
          </React.Fragment>
        );
      }

      createRoot(document.getElementById('root')).render(<StrictMode><App /></StrictMode>);
    </script>
  </body>
</html>
