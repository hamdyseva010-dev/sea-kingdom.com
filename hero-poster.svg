<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B7A2B"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="60%" stop-color="#E2C97E"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <!-- Subtle wave lines -->
    <pattern id="waves" x="0" y="0" width="200" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 30 Q50 10 100 30 Q150 50 200 30" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Subtle wave texture -->
  <rect width="1920" height="1080" fill="url(#waves)"/>

  <!-- Horizon line (sea feel) -->
  <line x1="0" y1="600" x2="1920" y2="600" stroke="#C9A84C" stroke-width="0.5" opacity="0.12"/>

  <!-- Gold top line -->
  <rect x="0" y="0" width="1920" height="1" fill="url(#gold)" opacity="0.4"/>

  <!-- Center diamond ornament -->
  <g transform="translate(960, 480)">
    <rect x="-6" y="-6" width="12" height="12" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.6" transform="rotate(45)"/>
    <rect x="-12" y="-12" width="24" height="24" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.3" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="2" fill="#C9A84C" opacity="0.7"/>
  </g>

  <!-- Horizontal rule lines -->
  <line x1="760" y1="480" x2="920" y2="480" stroke="url(#gold)" stroke-width="0.6" opacity="0.5"/>
  <line x1="1000" y1="480" x2="1160" y2="480" stroke="url(#gold)" stroke-width="0.6" opacity="0.5"/>

  <!-- Loading indicator text -->
  <text x="960" y="560" text-anchor="middle" font-family="Georgia, serif" font-size="11"
        letter-spacing="6" fill="#C9A84C" opacity="0.4">LUMARA · RED SEA CHARTERS</text>
</svg>
